<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booking Confirmed | DRIVE Luxury</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/booking-success-luxury.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<!-- ================= NAVBAR ================= -->
  <nav class="main-navbar">
    <div class="logo"><a href="index.html">DRIVE</a></div>
    <ul class="nav-links">
      <li><a href="budget.html">Budget</a></li>
      <li><a href="premium.html">Premium</a></li>
      <li><a href="luxury.html" class="active">Luxury</a></li>
      <li id="authLink"><a href="login.html">Login</a></li>
    </ul>
  </nav>

<!-- ================= SUCCESS ================= -->
<section class="success-wrapper">

  <div class="success-card">

    <div class="checkmark">✓</div>

    <h1>Booking Confirmed</h1>

    <p class="subtext">
      Your luxury drive has been successfully reserved.
      Our team will contact you shortly.
    </p>

    <div class="details-box">
      <div>
        <span>Selected Car</span>
        <strong id="carName">—</strong>
      </div>
      <div>
        <span>Total Price</span>
        <strong id="totalPrice">—</strong>
      </div>
    </div>

    <p class="subtext" style="font-style: italic;">
      “Luxury is not about owning things — it’s about experiencing moments.”
    </p>

    <div class="actions">
      <a href="luxury.html" class="btn-outline">Back to Luxury</a>
    </div>

  </div>

</section>

<script>
  // ============================
  // LOAD BOOKING DATA
  // ============================
  const data = JSON.parse(localStorage.getItem("luxuryBooking"));

  if (data) {
    document.getElementById("carName").textContent =
      data.car.toUpperCase();

    document.getElementById("totalPrice").textContent =
      data.total;
  }
</script>

<script src="js/auth.js"></script>
</body>
</html>
