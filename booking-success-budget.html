<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booking Confirmed</title>

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/booking-success.budget.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<section class="success-wrapper">

  <div class="success-card">

    <div class="checkmark">✓</div>

    <h1>Booking Confirmed!</h1>
    <p class="subtitle">
      Your budget car has been successfully booked.
    </p>

    <div class="summary">
      <p><strong>Car:</strong> <span id="successCar"></span></p>
      <p><strong>Pickup:</strong> <span id="successPickup"></span></p>
      <p><strong>Drop:</strong> <span id="successDrop"></span></p>
      <p><strong>Location:</strong> <span id="successLocation"></span></p>
    </div>

    <a href="budget.html" class="home-btn">
      Back to Budget Cars
    </a>

  </div>

</section>

<script src="js/booking-success-budget.js"></script>
</body>
</html>
