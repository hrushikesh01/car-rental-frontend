<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Luxury Booking | DRIVE</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Reset & luxury styles (CSS next step) -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/booking-luxury.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<!-- ================= NAVBAR ================= -->
  <nav class="main-navbar">
    <div class="logo"><a href="index.html">DRIVE</a></div>
    <ul class="nav-links">
      <li><a href="budget.html">Budget</a></li>
      <li><a href="premium.html">Premium</a></li>
      <li><a href="luxury.html" class="active">Luxury</a></li>
      <li id="authLink"><a href="login.html">Login</a></li>
    </ul>
  </nav>

<!-- ================= BOOKING WRAPPER ================= -->
<section class="booking-wrapper">

  <!-- LEFT : CAR SUMMARY -->
  <div class="booking-car">
    <span class="label">Selected Vehicle</span>
    <h1 id="carName">Luxury Car</h1>

    <div class="car-preview">
      <img id="carImage" src="" alt="Luxury car">
    </div>

    <p class="note">
      Experience luxury with professional handling and premium service.
    </p>
  </div>

  <!-- RIGHT : BOOKING FORM -->
  <div class="booking-form">

    <h2>Book Your Drive</h2>

    <!-- DATES -->
    <div class="field">
      <label>Pickup Date</label>
      <input type="date" id="pickupDate">
    </div>

    <div class="field">
      <label>Drop Date</label>
      <input type="date" id="dropDate">
    </div>

    <!-- DELIVERY OPTION -->
    <div class="field">
      <label>Delivery Option</label>

      <div class="radio-group">
        <label>
          <input type="radio" name="delivery" value="showroom" checked>
          Pickup at Showroom (Free)
        </label>

        <label>
          <input type="radio" name="delivery" value="home">
          Home Delivery (+ ₹2000)
        </label>
      </div>
    </div>

    <!-- ADDRESS (HOME DELIVERY) -->
    <div class="field address-box" id="addressBox">
      <label>Delivery Address</label>
      <textarea placeholder="Enter delivery address"></textarea>
    </div>

    <!-- PRICE SUMMARY -->
    <div class="price-box">
      <div>
        <span>Total Days</span>
        <strong id="totalDays">0</strong>
      </div>

      <div>
        <span>Total Price</span>
        <strong id="totalPrice">₹0</strong>
      </div>
    </div>

    <!-- CONFIRM -->
    <button id="confirmBooking" class="confirm-btn">
      Confirm Booking
    </button>

    <p class="payment-note">
      Payment will be collected at pickup or delivery.
    </p>

  </div>

</section>

<script src="js/api.js"></script>
<script src="js/booking-luxury.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
